name: Build Flint2 Extra Packages

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev \
          file wget curl zstd

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xf openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64 sdk

      - name: Add third-party feeds
        run: |
          cd sdk
          echo "src-git small https://github.com/kenzok8/small-package.git" >> feeds.conf.default
          echo "src-git luci-app-sing-box https://github.com/lxiaya/openwrt-luci-app-sing-box.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Find packages
        run: |
          cd sdk
          find feeds package -iname "*sing*box*" || true
          find feeds package -iname "*homeproxy*" || true

      - name: Build packages
        run: |
          cd sdk
          make defconfig
          make package/sing-box/compile V=s || true
          make package/luci-app-sing-box/compile V=s || true
          make package/luci-app-homeproxy/compile V=s || true

      - name: Upload IPK packages
        uses: actions/upload-artifact@v4
        with:
          name: flint2-extra-ipk
          path: sdk/bin/packages/**/*.ipk
