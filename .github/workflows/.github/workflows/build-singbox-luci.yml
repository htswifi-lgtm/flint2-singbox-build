name: Build luci-app-sing-box for GL-MT6000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl zstd

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.4/targets/mediatek/filogic/openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar --use-compress-program=unzstd -xvf openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-24.10.4-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64 sdk

      - name: Add extra packages feed
        run: |
          cd sdk
          echo "src-git small https://github.com/kenzok8/small-package.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Check package
        run: |
          cd sdk
          find package feeds -iname "*sing*box*" || true

      - name: Build luci-app-sing-box
        run: |
          cd sdk
          make defconfig
          make package/luci-app-sing-box/compile V=s || true
          make package/sing-box/compile V=s || true

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-luci-ipk
          path: sdk/bin/packages/**/*.ipk
